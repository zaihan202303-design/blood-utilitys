name: Build BLOOD UTILITYS Mod

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Make gradlew executable
      run: chmod +x ./gradlew
    
    - name: Build with Gradle
      run: ./gradlew build -x test
    
    - name: Upload JAR
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: blood-utilitys-1.0.0
        path: build/libs/*.jar
